<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小電視後台｜接單管理</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDci69wB6l51Wopobqd1KDPuqPY1C2ltH8",
    authDomain: "tv-chicken.firebaseapp.com",
    databaseURL: "https://tv-chicken-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tv-chicken",
    storageBucket: "tv-chicken.firebasestorage.app",
    messagingSenderId: "519305965834",
    appId: "1:519305965834:web:cf9330b5e4bfc26a820af3"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  onValue(ref(db,'orders'),snap=>{window.__orders=snap.val()||{};renderOrders();renderStats();});
  onValue(ref(db,'soldOut'),snap=>{window.__soldOut=snap.val()||{};renderSoldOut();});
  window.__updateOrderStatus=(key,status)=>update(ref(db,'orders/'+key),{status});
  window.__setSoldOut=(id,val)=>{const so={...(window.__soldOut||{})};if(val)so[id]=true;else delete so[id];return set(ref(db,'soldOut'),so);};
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
:root{--bg:#0f0f0f;--s1:#1a1a1a;--s2:#222;--s3:#2a2a2a;--accent:#f5c518;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;--text:#f0ede6;--dim:#777;--border:#2e2e2e;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--s1);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:10}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.sb-ico{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-nm{font-size:13px;font-weight:900;line-height:1.3}
.sb-menu{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--dim);transition:.15s;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--s2);color:var(--text)}
.sb-item.active{background:rgba(245,197,24,.12);color:var(--accent);font-weight:700}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.content{margin-left:200px;padding:24px;flex:1;min-width:0}
.panel{display:none}.panel.active{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:900}
.page-sub{font-size:12px;color:var(--dim);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-label{font-size:11px;color:var(--dim);margin-bottom:6px;letter-spacing:1px}
.stat-val{font-size:26px;font-weight:900}
.stat-val.yellow{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.blue{color:var(--blue)}.stat-val.orange{color:var(--orange)}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ftab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--s2);color:var(--dim);font-size:13px;cursor:pointer;transition:.15s}
.ftab.active{border-color:var(--accent);color:var(--accent);background:rgba(245,197,24,.08);font-weight:700}
.orders-grid{display:grid;gap:12px}
.order-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.order-card.new{border-color:var(--accent);box-shadow:0 0 0 2px rgba(245,197,24,.1)}
.order-card.done{opacity:.5}
.order-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.order-no{font-size:13px;font-weight:900;color:var(--accent)}
.order-name{font-size:15px;font-weight:900;margin-bottom:2px}
.order-phone{font-size:12px;color:var(--dim)}
.pickup-badge{background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap}
.order-items{background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.9}
.order-item-row{display:flex;justify-content:space-between}
.order-total-row{display:flex;justify-content:space-between;font-weight:900;border-top:1px solid var(--border);padding-top:6px;margin-top:4px}
.order-note{font-size:12px;color:var(--orange);background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:6px;padding:6px 10px;margin-bottom:12px}
.order-flavors{font-size:12px;color:var(--dim);margin-bottom:8px}
.order-actions{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;flex:1;min-width:80px}
.act-btn:active{transform:scale(.97)}
.btn-accept{background:var(--green);color:#fff}
.btn-done{background:var(--blue);color:#fff}
.btn-cancel{background:var(--s3);color:var(--dim);border:1px solid var(--border)}
.status-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.s-pending{background:rgba(245,197,24,.15);color:var(--accent)}
.s-accepted{background:rgba(34,197,94,.15);color:var(--green)}
.s-done{background:rgba(59,130,246,.15);color:var(--blue)}
.s-cancelled{background:rgba(239,68,68,.1);color:var(--red)}
.soldout-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.so-item{background:var(--s1);border:1.5px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.so-item.sold{border-color:var(--red);background:rgba(239,68,68,.06)}
.so-name{font-size:13px;font-weight:700;flex:1}
.toggle-sw{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.sw-track{position:absolute;inset:0;background:var(--s3);border-radius:12px;cursor:pointer;transition:.2s}
.sw-track::after{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#888;border-radius:50%;transition:.2s}
input:checked+.sw-track{background:var(--red)}
input:checked+.sw-track::after{transform:translateX(18px);background:#fff}
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.chart-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--dim);width:110px;text-align:right;flex-shrink:0}
.bar-wrap{flex:1;background:var(--s3);border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#111;min-width:24px}
.bar-count{font-size:12px;color:var(--dim);width:40px;flex-shrink:0}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{display:flex;align-items:center;gap:12px;padding:8px 10px;background:var(--s2);border-radius:8px}
.rank-no{font-size:13px;font-weight:900;color:var(--accent);width:20px}
.rank-name{flex:1;font-size:14px;font-weight:700}
.rank-val{font-size:13px;color:var(--dim)}
.empty{text-align:center;padding:48px;color:var(--dim)}
@media(max-width:640px){
  .sidebar{width:100%;height:56px;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;padding:0;align-items:center}
  .sb-logo{display:none}
  .sb-menu{flex-direction:row;padding:0 12px;gap:0}
  .sb-item{flex-direction:column;gap:2px;padding:8px 10px;font-size:10px;justify-content:center}
  .content{margin-left:0;margin-top:56px;padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .soldout-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sb-logo"><div class="sb-ico">📺</div><div class="sb-nm">小電視<br>後台管理</div></div>
    <div class="sb-menu">
      <button class="sb-item active" onclick="showPanel('orders',this)"><span>📋</span>訂單管理<span class="sb-badge" id="new-count" style="display:none">0</span></button>
      <button class="sb-item" onclick="showPanel('soldout',this)"><span>🚫</span>售完設定</button>
      <button class="sb-item" onclick="showPanel('stats',this)"><span>📊</span>銷售統計</button>
    </div>
  </nav>
  <main class="content">
    <div class="panel active" id="panel-orders">
      <div class="topbar"><div><div class="page-title">訂單管理</div><div class="page-sub" id="order-time-note">即時更新中</div></div><button style="background:var(--s2);border:1px solid var(--border);color:var(--dim);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer" onclick="renderOrders()">🔄 重新整理</button></div>
      <div class="stats-grid"><div class="stat-card"><div class="stat-label">今日訂單</div><div class="stat-val yellow" id="s-today">0</div></div><div class="stat-card"><div class="stat-label">待處理</div><div class="stat-val orange" id="s-pending">0</div></div><div class="stat-card"><div class="stat-label">今日營收</div><div class="stat-val green" id="s-revenue">$0</div></div><div class="stat-card"><div class="stat-label">已完成</div><div class="stat-val blue" id="s-done">0</div></div></div>
      <div class="filter-tabs"><div class="ftab active" onclick="setFilter('all',this)">全部</div><div class="ftab" onclick="setFilter('待處理',this)">待處理</div><div class="ftab" onclick="setFilter('已接單',this)">已接單</div><div class="ftab" onclick="setFilter('已完成',this)">已完成</div><div class="ftab" onclick="setFilter('已取消',this)">已取消</div></div>
      <div class="orders-grid" id="orders-grid"></div>
    </div>
    <div class="panel" id="panel-soldout"><div class="topbar"><div><div class="page-title">售完設定</div><div class="page-sub">開啟後客人無法點該品項</div></div></div><div class="soldout-grid" id="soldout-grid"></div></div>
    <div class="panel" id="panel-stats"><div class="topbar"><div><div class="page-title">銷售統計</div><div class="page-sub">今日數據</div></div></div><div class="chart-card"><div class="chart-title">📊 各品項銷售量（今日）</div><div class="bar-chart" id="bar-chart"></div></div><div class="chart-card"><div class="chart-title">🏆 銷售排行</div><div class="rank-list" id="rank-list"></div></div></div>
  </main>
</div>
<script>
window.__orders={};window.__soldOut={};let currentFilter='all';
const ALL_ITEMS=['小電視雞排','帥氣小生香脆雞','小豬無骨排骨酥','魷米花','魷魚圈','均衡餐','櫛瓜','杏鮑GU','玉米筍','四季豆','蘿蔔糕','糯米腸','甜不辣','QQ芋籤(甜)','早餐店熱狗×3','米血糕','百頁豆腐','有穿麵衣的熱狗棒','小時候蝦片','雞蛋豆腐','軟綿綿起司球×4','椒鹽脆薯','義式香料脆薯','芋頭起司球×2','雞屁股勵鼓勵','澎澎湯圓','地瓜條 (+甘梅)','炸蘋果 (+肉桂)'];
const ITEM_IDS={'小電視雞排':'雞排','帥氣小生香脆雞':'香脆雞','小豬無骨排骨酥':'排骨酥','魷米花':'魷米花','魷魚圈':'魷魚圈','均衡餐':'均衡餐','櫛瓜':'櫛瓜','杏鮑GU':'杏鮑GU','玉米筍':'玉米筍','四季豆':'四季豆','蘿蔔糕':'蘿蔔糕','糯米腸':'糯米腸','甜不辣':'甜不辣','QQ芋籤(甜)':'QQ芋籤','早餐店熱狗×3':'熱狗','米血糕':'米血糕','百頁豆腐':'百頁豆腐','有穿麵衣的熱狗棒':'熱狗棒','小時候蝦片':'蝦片','雞蛋豆腐':'雞蛋豆腐','軟綿綿起司球×4':'起司球','椒鹽脆薯':'椒鹽脆薯','義式香料脆薯':'義式脆薯','芋頭起司球×2':'芋頭起司球','雞屁股勵鼓勵':'雞屁股','澎澎湯圓':'湯圓','地瓜條 (+甘梅)':'地瓜條','炸蘋果 (+肉桂)':'炸蘋果'};
function showPanel(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');btn.classList.add('active');if(id==='stats')renderStats();if(id==='soldout')renderSoldOut();}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderOrders();}
function isToday(iso){const d=new Date(iso),now=new Date();return d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function fmtTime(iso){const d=new Date(iso);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function statusClass(s){if(s==='待處理')return 's-pending';if(s==='已接單')return 's-accepted';if(s==='已完成')return 's-done';if(s==='已取消')return 's-cancelled';return 's-pending';}
function renderOrders(){const orders=window.__orders;const grid=document.getElementById('orders-grid');const now=new Date();document.getElementById('order-time-note').textContent='最後更新：'+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');let entries=Object.entries(orders).sort((a,b)=>new Date(b[1].createdAt)-new Date(a[1].createdAt));if(currentFilter!=='all')entries=entries.filter(([,o])=>o.status===currentFilter);const todayAll=Object.values(orders).filter(o=>isToday(o.createdAt));const pending=todayAll.filter(o=>o.status==='待處理').length;document.getElementById('s-today').textContent=todayAll.length;document.getElementById('s-pending').textContent=pending;document.getElementById('s-revenue').textContent='$'+todayAll.filter(o=>o.status!=='已取消').reduce((s,o)=>s+o.total,0);document.getElementById('s-done').textContent=todayAll.filter(o=>o.status==='已完成').length;const badge=document.getElementById('new-count');if(pending>0){badge.style.display='';badge.textContent=pending;}else badge.style.display='none';if(!entries.length){grid.innerHTML='<div class="empty"><div style="font-size:48px">📭</div>目前沒有符合的訂單</div>';return;}grid.innerHTML=entries.map(([key,o])=>{const isNew=o.status==='待處理';const isDone=o.status==='已完成'||o.status==='已取消';const actions=isNew?'<button class="act-btn btn-accept" onclick="updateStatus(\''+key+'\',\'已接單\')">✓ 接單</button><button class="act-btn btn-cancel" onclick="updateStatus(\''+key+'\',\'已取消\')">✕ 取消</button>':o.status==='已接單'?'<button class="act-btn btn-done" onclick="updateStatus(\''+key+'\',\'已完成\')">✓ 完成取餐</button><button class="act-btn btn-cancel" onclick="updateStatus(\''+key+'\',\'已取消\')">✕ 取消</button>':'';return'<div class="order-card'+(isNew?' new':'')+(isDone?' done':'')+'"><div class="order-hd"><div><div class="order-no">#'+o.orderNo+' <span class="status-badge '+statusClass(o.status)+'">'+o.status+'</span></div><div style="margin-top:6px"><div class="order-name">'+o.name+'</div><div class="order-phone">'+o.phone+'</div></div></div><div style="text-align:right"><div class="pickup-badge">🕐 '+o.pickupTime+'</div><div style="font-size:11px;color:var(--dim);margin-top:6px">'+fmtTime(o.createdAt)+' 下單</div></div></div>'+(o.flavors&&o.flavors!=='無'?'<div class="order-flavors">加料：'+o.flavors+'</div>':'')+'<div class="order-items">'+o.items.map(i=>'<div class="order-item-row"><span>'+i.name+(i.size&&i.size!=='正常'?'（'+i.size+'）':'')+'</span><span>×'+i.qty+'　$'+i.price*i.qty+'</span></div>').join('')+'<div class="order-total-row"><span>合計</span><span>$'+o.total+'</span></div></div>'+(o.note?'<div class="order-note">📝 '+o.note+'</div>':'')+(actions?'<div class="order-actions">'+actions+'</div>':'')+'</div>';}).join('');}
function updateStatus(key,status){if(window.__updateOrderStatus)window.__updateOrderStatus(key,status);}
function renderSoldOut(){const so=window.__soldOut||{};const grid=document.getElementById('soldout-grid');grid.innerHTML=ALL_ITEMS.map(name=>{const id=ITEM_IDS[name]||name;const isSold=!!so[id];return'<div class="so-item'+(isSold?' sold':'')+'" id="so-'+id+'"><div class="so-name">'+name+'</div><label class="toggle-sw"><input type="checkbox"'+(isSold?' checked':'')+' onchange="toggleSoldOut(\''+id+'\',this.checked)"><div class="sw-track"></div></label></div>';}).join('');}
function toggleSoldOut(id,val){if(window.__setSoldOut)window.__setSoldOut(id,val);}
function renderStats(){const orders=Object.values(window.__orders||{}).filter(o=>isToday(o.createdAt)&&o.status!=='已取消');const counts={};orders.forEach(o=>{o.items.forEach(i=>{counts[i.name]=(counts[i.name]||0)+i.qty;});});const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);const max=sorted[0]?sorted[0][1]:1;const barChart=document.getElementById('bar-chart');const rankList=document.getElementById('rank-list');if(!sorted.length){barChart.innerHTML='<div style="color:var(--dim);font-size:14px;padding:20px 0;text-align:center">今日尚無訂單</div>';rankList.innerHTML='';return;}barChart.innerHTML=sorted.slice(0,10).map(([name,cnt])=>'<div class="bar-row"><div class="bar-label">'+(name.length>8?name.slice(0,8)+'…':name)+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+Math.round(cnt/max*100)+'%">'+cnt+'</div></div><div class="bar-count">'+cnt+' 份</div></div>').join('');rankList.innerHTML=sorted.slice(0,8).map(([name,cnt],i)=>'<div class="rank-row"><div class="rank-no">'+(['🥇','🥈','🥉'][i]||'#'+(i+1))+'</div><div class="rank-name">'+name+'</div><div class="rank-val">'+cnt+' 份</div></div>').join('');}
</script>
</body>
</html>
